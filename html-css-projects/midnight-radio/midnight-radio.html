<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="midnight-radio.css" />
</head>
<body>
  <main class="radio-shell">
    <section class="left-panel">
      <p class="stamp">LIVE NOW</p>
      <h1>Midnight Radio</h1>
      <p class="desc">An indie synthwave stream with hand-picked tracks, lo-fi city visuals, and zero ads after midnight.</p>

      <div class="actions">
        <button type="button" class="btn-play">Play Stream</button>
        <button type="button" class="btn-ghost">Playlist</button>
      </div>

      <div class="equalizer" aria-label="Audio levels">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </section>

    <section class="right-panel">
      <h2>Tonight's Queue</h2>
      <ul>
        <li><strong>Neon Alley</strong><small>Echo Unit</small></li>
        <li><strong>Afterglow Lines</strong><small>Violet Static</small></li>
        <li><strong>Half Moon Drive</strong><small>City Cassette</small></li>
        <li><strong>Low Tide Lights</strong><small>Nightforms</small></li>
      </ul>
      <p class="footnote">Streaming in 320kbps • HQ Stereo</p>
    </section>
  </main>
</body>
</html>
