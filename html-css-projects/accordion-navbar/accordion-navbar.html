<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordion Navbar - Pure HTML CSS</title>
    <link rel="stylesheet" href="accordion-navbar.css">
</head>
<body>
    <nav class="navbar" role="navigation">
        <div class="nav-item">
            <button class="nav-trigger" aria-expanded="false">
                🏠 Home
            </button>
            <div class="submenu">
                <a href="#" class="submenu-item">Dashboard</a>
                <a href="#" class="submenu-item">Profile</a>
                <a href="#" class="submenu-item">Settings</a>
            </div>
        </div>

        <div class="nav-item">
            <button class="nav-trigger" aria-expanded="false">
                📊 Products
            </button>
            <div class="submenu">
                <a href="#" class="submenu-item">All Products</a>
                <a href="#" class="submenu-item">Featured</a>
                <a href="#" class="submenu-item">New Arrivals</a>
            </div>
        </div>

        <div class="nav-item">
            <button class="nav-trigger" aria-expanded="false">
                👥 Users
            </button>
            <div class="submenu">
                <a href="#" class="submenu-item">Manage Users</a>
                <a href="#" class="submenu-item">Permissions</a>
                <a href="#" class="submenu-item">Activity Log</a>
            </div>
        </div>

        <div class="nav-item">
            <button class="nav-trigger" aria-expanded="false">
                💳 Billing
            </button>
            <div class="submenu">
                <a href="#" class="submenu-item">Subscriptions</a>
                <a href="#" class="submenu-item">Invoices</a>
                <a href="#" class="submenu-item">Payment Methods</a>
            </div>
        </div>
    </nav>

    <main class="content">
        <h1>Interactive Accordion Navbar</h1>
        <p>Click any menu item to expand/collapse submenus. Pure HTML/CSS - No JavaScript!</p>
    </main>
</body>
</html>
