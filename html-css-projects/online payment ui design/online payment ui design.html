<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Online Payment UI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="online payment ui design.css" />
</head>
<body>
  <div class="main-container">
    <header>
      <h1>Secure Payment</h1>
      <p class="security-badge"><i class="fas fa-lock"></i> 256-bit Encryption</p>
    </header>

    <form class="card-form" id="paymentForm">
      <div class="card">
        <div class="card-design">
          <div class="card-chip"></div>
          <div class="card-head">
            <span>Card Number</span>
            <i class="fab fa-cc-visa visa-icon"></i>
          </div>
        </div>
        
        <div class="form-group">
          <label for="cardNumber">Card Number</label>
          <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required />
        </div>

        <div class="card-row">
          <div class="card-col">
            <div class="form-group">
              <label for="expiry">Expiry Date</label>
              <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required />
            </div>
          </div>
          <div class="card-col">
            <div class="form-group">
              <label for="cvv">CVV</label>
              <input type="password" id="cvv" placeholder="123" maxlength="4" required />
            </div>
          </div>
        </div>

        <div class="card-row">
          <div class="card-col">
            <div class="form-group">
              <label for="cardholder">Cardholder Name</label>
              <input type="text" id="cardholder" placeholder="John Doe" required />
            </div>
          </div>
          <div class="card-col">
            <div class="form-group">
              <label for="zipcode">ZIP Code</label>
              <input type="text" id="zipcode" placeholder="1100XX" required />
            </div>
          </div>
        </div>

        <button type="submit" class="pay-btn">
          <span>Pay Now</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </form>
  </div>
</body>
</html>
