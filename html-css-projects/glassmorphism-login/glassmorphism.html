<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="glassmorphism.css">
</head>
<body>
    <main class="page-wrap">
        <section class="glass-card" aria-labelledby="login-title">
            <p class="eyebrow">Secure Portal</p>
            <h1 id="login-title">Welcome back</h1>
            <p class="subtitle">Sign in to continue managing your dashboard and team activity.</p>

            <form class="login-form" action="#" method="post">
                <label for="email">Email Address</label>
                <input id="email" name="email" type="email" placeholder="you@company.com" autocomplete="email" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>

                <div class="form-row">
                    <label class="remember">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="muted-link">Forgot password?</a>
                </div>

                <button type="submit">Sign In</button>
            </form>

            <p class="signup-text">New here? <a href="#">Create an account</a></p>
        </section>
    </main>
</body>
</html>
