<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sliding Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="slide toggles.css">
</head>

<body>
    <div class="container">
        <input type="radio" id="login" name="slide" checked>
        <input type="radio" id="signup" name="slide">

        <div class="forms">
            <div class="form login">
                <p class="tag">Member Access</p>
                <h2>Login</h2>
                <p class="sub">Use your account details to continue.</p>
                <input type="email" placeholder="Email" autocomplete="email" required>
                <input type="password" placeholder="Password" autocomplete="current-password" required>
                <button type="button">Login</button>
            </div>

            <div class="form signup">
                <p class="tag">Create Account</p>
                <h2>Sign Up</h2>
                <p class="sub">Set up your profile in a few seconds.</p>
                <input type="text" placeholder="Username" autocomplete="username" required>
                <input type="email" placeholder="Email" autocomplete="email" required>
                <input type="password" placeholder="Password" autocomplete="new-password" required>
                <button type="button">Sign Up</button>
            </div>
        </div>

        <div class="toggle">
            <label for="login">Login</label>
            <label for="signup">Sign Up</label>
            <div class="slider"></div>
        </div>
    </div>
</body>

</html>
