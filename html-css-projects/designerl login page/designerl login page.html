<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForTheWorld - Portfolio Card</title>
    <link rel="stylesheet" href="designerl login page.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="card">
        <div class="profile-img">
            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=300&h=300&fit=crop&crop=face"
                alt="Profile">
        </div>
        <div class="card-content">
            <h1>ForTheWorld</h1>
            <h3>Frontend Developer</h3>
            <p>MAIT CST | Building responsive websites with modern tech</p>

            <div class="skills">
                <span>HTML/CSS</span>
                <span>JavaScript</span>
                <span>React</span>
                <span>Tailwind</span>
            </div>

            <div class="stats">
                <div class="stat">
                    <span class="number">50+</span>
                    <span>Projects</span>
                </div>
                <div class="stat">
                    <span class="number">100+</span>
                    <span>LeetCode</span>
                </div>
                <div class="stat">
                    <span class="number">7.5+</span>
                    <span>CGPA</span>
                </div>
            </div>

            <div class="action-buttons">
                <a href="#" class="btn-primary">View Portfolio</a>
                <a href="#" class="btn-secondary">Contact Me</a>
            </div>
        </div>
    </div>
</body>

</html>
