<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Card Flip</title>
    <link rel="stylesheet" href="cardflip.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="card-container">
        <div class="card">
            <div class="card-front">
                <div class="card-image">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300&h=400&fit=crop"
                        alt="Product">
                </div>
                <h3>Premium Watch</h3>
                <p class="price">$299</p>
            </div>
            <div class="card-back">
                <h3>Features</h3>
                <ul>
                    <li>Waterproof 50m</li>
                    <li>Sapphire Crystal</li>
                    <li>Automatic Movement</li>
                    <li>Stainless Steel</li>
                </ul>
                <button class="buy-btn">Buy Now</button>
            </div>
        </div>
    </div>
</body>

</html>
