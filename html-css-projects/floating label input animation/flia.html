<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Glassmorphism Input Animation</title>
    <link rel="stylesheet" href="flia.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="input-group">
            <input type="text" id="firstName" required autocomplete="off" class="input">
            <label class="userlabel" for="firstName">First Name</label>
        </div>

        <div class="input-group">
            <input type="email" id="email" required autocomplete="off" class="input">
            <label class="userlabel" for="email">Email Address</label>
        </div>

        <div class="input-group">
            <input type="password" id="password" required autocomplete="off" class="input">
            <label class="userlabel" for="password">Password</label>
        </div>

        <button class="submit-btn">Get Started</button>
    </div>
</body>
</html>
