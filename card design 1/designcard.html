<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Card Design</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #221d2d 0%, #2d1b3a 50%, #1a1524 100%);
            padding: 2rem;
            color: #fdfcfd;
        }

        .card {
            display: flex;
            align-items: center;
            height: 425px;
            width: 480px;
            background: linear-gradient(145deg, #7457b8 0%, #121017 100%);
            border-radius: 20px;
            padding: 28px;
            box-shadow:
                0 24px 48px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff6b9d, #c44569, #ff6b9d);
            border-radius: 20px 20px 0 0;
        }

        .card img {
            width: 189px;
            height: 202px;
            object-fit: cover;
            border-radius: 16px;
            margin-right: 24px;
            flex-shrink: 0;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 231px;
            height: 246px;
            padding: 20px;
        }


        .card h1 {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.2;
            background: linear-gradient(135deg, #fdfcfd 0%, #f0e8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        .card h2 {
            font-size: 0.85rem;
            font-weight: 500;
            color: #a8a4b1;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .card p {
            font-size: 0.85rem;
            font-weight: bold;
            line-height: 1.5;
            color: #d1cddf;
            margin-bottom: 20px;
        }

        .card button {
            align-self: flex-start;
            padding: 10px 24px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.4);
            background: linear-gradient(135deg, #ff8ab5 0%, #d95482 100%);
        }

        .card button:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .card {
                flex-direction: column;
                height: 380px;
                width: 100%;
                max-width: 340px;
                padding: 24px 20px;
            }

            .card img {
                width: 90px;
                height: 90px;
                margin-right: 0;
                margin-bottom: 20px;
            }

            .card h1 {
                font-size: 1.4rem;
                text-align: center;
            }

            .card h2 {
                text-align: center;
            }

            .card button {
                width: 198px;
                align-self: center;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="stylish tourist girl.webp" alt="Stylish Tourist Girl">
        <div class="card-content">
            <h1>Kaye Morris</h1>
            <h2>UX Developer</h2>
            <p>Hi, I'm Kaye Morris. I am a UX developer. You can follow me by clicking the follow button below.</p>
            <button>Follow Me</button>
        </div>
    </div>
</body>

</html>
